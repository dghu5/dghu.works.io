<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自作ゲーム集</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>自作ゲーム集</h1>
        
        <div class="game-grid">

            <div class="game-card">
                <img src="image/coffee.png" alt="コーヒーカップ・ヘリコプター" class="game-thumbnail">
                <div class="game-info">
                    <h2 class="game-title">コーヒーカップ・ヘリコプター</h2>
                    <p class="game-description">
                        2021年にUnity1Weekで作成した作品。古い作品なので動作は保証しません。
                    </p>
                    <div class="game-links">
                        <a href="./works/coffee/index.html" class="btn">ブラウザで遊ぶ</a>
                    </div>
                </div>
            </div>

            <div class="game-card">
                <img src="image/shoes.png" alt="靴そろえバトル" class="game-thumbnail">
                <div class="game-info">
                    <h2 class="game-title">靴そろえバトル</h2>
                    <p class="game-description">
                        2022年にUnity1Weekで作成した作品。古い作品なので動作は保証しません。
                    </p>
                    <div class="game-links">
                        <a href="./works/shoes/index.html" class="btn">ブラウザで遊ぶ</a>
                    </div>
                </div>
            </div>

            <div class="game-card">
                <img src="image/CppGame.png" alt="C++Game" class="game-thumbnail">
                <div class="game-info">
                    <h2 class="game-title">C++ゲーム</h2>
                    <p class="game-description">
                        転職用にC++がどの程度書けるかの指標のためにDXライブラリで自前でゲームループを実装。ゲームとしての完成度は低いです。
                    </p>
                    <div class="game-links">
                        <a href="https://drive.google.com/file/d/1IQAendHG35TvKt2RUrNyQYKUAKE7fl0W/view?usp=sharing" class="btn" onclick="return confirm('作品CのZIPファイルをダウンロードしますか？');">DL版をダウンロード</a>
                        <a href="https://github.com/dghu5/CppGame" class="btn btn-secondary btn-code">GitHub</a>
                    </div>
                </div>
            </div>

        </div>
    </div>
