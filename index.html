<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🎮 Game Portfolio</h1>
        
        <div class="game-grid">

            <div class="game-card">
                <img src="img/screenshot_gameA.png" alt="作品Aのスクリーンショット" class="game-thumbnail">
                <div class="game-info">
                    <h2 class="game-title">作品タイトルA</h2>
                    <p class="game-description">
                        ここに簡単な説明文を記述します。ゲームのジャンルやルール,こだわったシステムなどを2〜3行でスマートに書くのがおすすめです。
                    </p>
                    <div class="game-links">
                        <a href="./works/coffee/index.html" class="btn">ブラウザで遊ぶ</a>
                        <a href="https://github.com/ユーザー名/リポジトリ名/releases" class="btn btn-secondary" onclick="return confirm('作品AのZIPファイルをダウンロードしますか？');">DL版</a>
                        <a href="https://github.com/ユーザー名/作品リポジトリ名" class="btn btn-secondary btn-code" title="ソースコードを見る">GitHub</a>
                    </div>
                </div>
            </div>

            <div class="game-card">
                <img src="img/screenshot_gameB.png" alt="作品Bのスクリーンショット" class="game-thumbnail">
                <div class="game-info">
                    <h2 class="game-title">作品タイトルB</h2>
                    <p class="game-description">
                        ソースコードを非公開にしたい作品の例です。GitHubボタンの行を削除するだけで、残りのボタンが自動で綺麗に横幅を分け合います。
                    </p>
                    <div class="game-links">
                        <a href="./works/shoes/index.html" class="btn">ブラウザで遊ぶ</a>
                        <a href="#" class="btn btn-secondary" onclick="return confirm('作品BのZIPファイルをダウンロードしますか？');">DL版</a>
                    </div>
                </div>
            </div>

            <div class="game-card">
                <img src="img/screenshot_gameC.png" alt="作品Cのスクリーンショット" class="game-thumbnail">
                <div class="game-info">
                    <h2 class="game-title">作品タイトルC（DL専用）</h2>
                    <p class="game-description">
                        WebGL版がない（PCでのDL実行専用などの）作品の場合は、以下のように「ブラウザで遊ぶ」ボタンを削って運用することも可能です。
                    </p>
                    <div class="game-links">
                        <a href="#" class="btn" onclick="return confirm('作品CのZIPファイルをダウンロードしますか？');">DL版をダウンロード</a>
                        <a href="https://github.com/ユーザー名/作品リポジトリ名" class="btn btn-secondary btn-code">GitHub</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
