<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自作ゲーム集</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>自作ゲーム集</h1>
        
        <div class="game-grid">

            <div class="game-card">
                <img src="image/coffee.png" alt="コーヒーカップ・ヘリコプター" class="game-thumbnail">
                <div class="game-info">
                    <h2 class="game-title">コーヒーカップ・ヘリコプター</h2>
                    <p class="game-description">
                        2021年にUnity1Weekで作成した作品。古い作品なので動作は保証しません。
                    </p>
                    <div class="game-links">
                        <a href="./works/coffee/index.html" class="btn">ブラウザで遊ぶ</a>
                    </div>
                </div>
            </div>

            <div class="game-card">
                <img src="image/shoes.png" alt="靴そろえバトル" class="game-thumbnail">
                <div class="game-info">
                    <h2 class="game-title">靴そろえバトル</h2>
                    <p class="game-description">
                        2022年にUnity1Weekで作成した作品。古い作品なので動作は保証しません。
                    </p>
                    <div class="game-links">
                        <a href="./works/shoes/index.html" class="btn">ブラウザで遊ぶ</a>
                    </div>
                </div>
            </div>

            <div class="game-card">
                <img src="img/screenshot_gameC.png" alt="作品Cのスクリーンショット" class="game-thumbnail">
                <div class="game-info">
                    <h2 class="game-title">作品タイトルC（DL専用）</h2>
                    <p class="game-description">
                        WebGL版がない（PCでのDL実行専用などの）作品の場合は、以下のように「ブラウザで遊ぶ」ボタンを削って運用することも可能です。
                    </p>
                    <div class="game-links">
                        <a href="#" class="btn" onclick="return confirm('作品CのZIPファイルをダウンロードしますか？');">DL版をダウンロード</a>
                        <a href="https://github.com/ユーザー名/作品リポジトリ名" class="btn btn-secondary btn-code">GitHub</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
